services:
  users.api:
    build:
      context: .
      dockerfile: Services/Users/User.API/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  users.db:
    image: postgres:16
    pull_policy: if_not_present
    volumes:
      - users-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  corejudge.db:
    image: postgres:16
    pull_policy: if_not_present
    volumes:
      - corejudge-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  caching:
    image: redis:8.6.1
    pull_policy: if_not_present
    container_name: redis-cache
    restart: always
    command: >
      redis-server
      --requirepass StrongRedisPassword123
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "StrongRedisPassword123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  corejudge.api:
    build:
      context: .
      dockerfile: Services/CoreJudge/CoreJudge.API/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


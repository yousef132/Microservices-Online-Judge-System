  logging-jaeger:
    image: jaegertracing/all-in-one:1
    pull_policy: if_not_present
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api.gateway:
    image: api.gateway
    build:
      context: .
      dockerfile: Gateways/API.Gateway/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  elasticsearch:
    image: elasticsearch:9.2.7
    pull_policy: if_not_present
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:9.2.7
    pull_policy: if_not_present
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5

  collaboration.api:
    build:
      context: ./Services/Collaboration
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/collaboration/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./Web
    ports:
      - "5173:5173"
    volumes:
      - ./Web:/app
      - /app/node_modules
    depends_on:
      - api.gateway
      - collaboration.api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  users-pgdata:
  corejudge-pgdata:
  keycloak-pgdata:
  redis-data:
  elasticsearch-data:
